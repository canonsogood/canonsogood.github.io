<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>攝影作品集</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400&family=Noto+Sans+TC:wght@300;400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #1a1916;
  --ink-soft: #6b6860;
  --ink-muted: #b0ada6;
  --paper: #f7f5f1;
  --paper-warm: #ede9e2;
  --line: rgba(26,25,22,0.1);
  --accent: #c4a882;
  --serif: 'DM Serif Display', 'Noto Serif TC', serif;
  --sans: 'Noto Sans TC', sans-serif;
  --gap: clamp(20px, 4vw, 48px);
}
html { scroll-behavior: smooth; }
body { background: var(--paper); color: var(--ink); font-family: var(--sans); font-weight: 300; line-height: 1.8; min-height: 100vh; }

nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px var(--gap);
  background: rgba(247,245,241,0.92); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--line);
}
.nav-name { font-family: var(--serif); font-size: 18px; letter-spacing: 0.04em; color: var(--ink); cursor: pointer; }
.nav-links { display: flex; gap: 28px; list-style: none; }
.nav-links a { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-soft); text-decoration: none; cursor: pointer; transition: color 0.2s; }
.nav-links a:hover { color: var(--ink); }

.breadcrumb {
  position: fixed; top: 57px; left: 0; right: 0; z-index: 99;
  display: flex; align-items: center; gap: 8px;
  padding: 10px var(--gap);
  background: rgba(247,245,241,0.92); backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--line);
  font-size: 11px; letter-spacing: 0.1em; color: var(--ink-muted);
  transition: opacity 0.3s;
}
.breadcrumb.hidden { opacity: 0; pointer-events: none; }
.breadcrumb .bc-link { cursor: pointer; transition: color 0.2s; }
.breadcrumb .bc-link:hover { color: var(--ink); }
.breadcrumb .sep { color: var(--ink-muted); }
.breadcrumb .current { color: var(--ink-soft); cursor: default; }

.page { display: none; padding-top: 57px; }
.page.active { display: block; }
.page.has-bc { padding-top: 97px; }

/* HOME */
.home-hero {
  padding: 80px var(--gap) 56px;
  max-width: 1100px; margin: 0 auto;
  display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: end;
}
.home-hero h1 { font-family: var(--serif); font-size: clamp(40px, 6vw, 72px); font-weight: 400; line-height: 1.1; margin-bottom: 20px; }
.home-hero h1 em { font-style: italic; color: var(--ink-soft); }
.home-hero p { font-size: 13px; color: var(--ink-soft); max-width: 320px; letter-spacing: 0.02em; }
.hero-num { text-align: right; }
.hero-num .big { font-family: var(--serif); font-size: 80px; line-height: 1; color: var(--paper-warm); -webkit-text-stroke: 1px var(--ink-muted); display: block; }
.hero-num small { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-muted); margin-top: 6px; display: block; }

.home-section { max-width: 1100px; margin: 0 auto; padding: 0 var(--gap) 80px; }
.section-rule { border: none; border-top: 1px solid var(--line); margin-bottom: 0; }

/* FILTER */
.filter-wrap {
  padding: 20px 0 28px;
  display: flex; gap: 8px; flex-wrap: wrap;
  border-bottom: 1px solid var(--line);
}
.filter-btn {
  padding: 7px 16px; border: 1px solid var(--line); border-radius: 2px;
  background: transparent; font-family: var(--sans); font-size: 11px; font-weight: 300;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-soft);
  cursor: pointer; transition: all 0.18s;
}
.filter-btn:hover { border-color: var(--ink-soft); color: var(--ink); }
.filter-btn.active { background: var(--ink); border-color: var(--ink); color: var(--paper); }

/* ALBUM GRID */
.album-grid {
  padding-top: 36px;
  display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 24px;
}
.album-card { cursor: pointer; }
.album-thumb { position: relative; overflow: hidden; aspect-ratio: 3/2; background: var(--paper-warm); border-radius: 1px; }
.album-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94); }
.album-card:hover .album-thumb img { transform: scale(1.05); }
.album-info { padding: 12px 0 0; }
.album-title { font-family: var(--serif); font-size: 17px; font-weight: 400; color: var(--ink); }
.album-sub { font-size: 11px; letter-spacing: 0.07em; color: var(--ink-muted); margin-top: 2px; }
.album-tag { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-muted); margin-top: 3px; display: block; }

/* ALBUM PAGE */
.page-header {
  max-width: 1100px; margin: 0 auto;
  padding: 56px var(--gap) 36px;
  border-bottom: 1px solid var(--line);
  display: flex; justify-content: space-between; align-items: flex-end;
}
.page-header h2 { font-family: var(--serif); font-size: clamp(26px, 4vw, 44px); font-weight: 400; }
.page-header .meta { font-size: 11px; letter-spacing: 0.1em; color: var(--ink-muted); text-align: right; }

.album-toolbar {
  max-width: 1100px; margin: 0 auto;
  padding: 20px var(--gap) 4px;
  display: flex; justify-content: flex-end; gap: 8px;
}
.view-btn {
  display: flex; align-items: center; justify-content: center;
  width: 36px; height: 36px; border-radius: 2px;
  border: 1px solid var(--line); background: transparent;
  cursor: pointer; transition: all 0.18s; color: var(--ink-muted);
}
.view-btn:hover { border-color: var(--ink-soft); color: var(--ink-soft); }
.view-btn.active { background: var(--ink); border-color: var(--ink); color: var(--paper); }
.view-btn svg { width: 16px; height: 16px; display: block; }

.photo-grid { max-width: 1400px; margin: 0 auto; padding: 16px var(--gap) 80px; }
.photo-grid.cols-3 { columns: 3; column-gap: 10px; }
.photo-grid.cols-1 { columns: 1; }
.photo-item {
  break-inside: avoid; margin-bottom: 10px;
  cursor: pointer; position: relative; overflow: hidden; border-radius: 1px;
}
.photo-grid.cols-1 .photo-item { margin-bottom: 20px; }
.photo-item img { width: 100%; display: block; transition: transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94); }
.photo-item:hover img { transform: scale(1.02); }
.photo-grid.cols-1 .photo-caption { display: flex; justify-content: space-between; padding: 8px 0 0; font-size: 11px; letter-spacing: 0.07em; color: var(--ink-muted); }
.photo-grid.cols-3 .photo-caption { display: none; }

/* ABOUT / CONTACT */
.bottom-sections { max-width: 1100px; margin: 0 auto; }
.bottom-section {
  padding: 64px var(--gap); border-top: 1px solid var(--line);
  display: grid; grid-template-columns: 180px 1fr; gap: 48px; align-items: start;
}
.section-label { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-muted); padding-top: 4px; }
.section-content h3 { font-family: var(--serif); font-size: 28px; font-weight: 400; margin-bottom: 16px; line-height: 1.2; }
.section-content p { font-size: 13px; color: var(--ink-soft); max-width: 460px; margin-bottom: 12px; }
.contact-rows { display: flex; flex-direction: column; gap: 14px; }
.contact-row { display: flex; align-items: center; gap: 16px; font-size: 13px; color: var(--ink-soft); }
.contact-row .lbl { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-muted); width: 48px; flex-shrink: 0; }

footer { border-top: 1px solid var(--line); padding: 28px var(--gap); max-width: 1100px; margin: 0 auto; display: flex; justify-content: space-between; }
footer p { font-size: 11px; color: var(--ink-muted); letter-spacing: 0.05em; }

/* LIGHTBOX */
.lightbox {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(18,17,16,0.95);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.22s; padding: 48px;
}
.lightbox.open { opacity: 1; pointer-events: all; }
.lb-inner { position: relative; max-width: 1400px; width: 100%; }
.lb-inner img { width: 100%; max-height: 92vh; object-fit: contain; display: block; border-radius: 1px; }
.lb-close {
  position: absolute; top: -40px; right: 0;
  background: none; border: none; color: rgba(247,245,241,0.45);
  font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer;
  font-family: var(--sans); transition: color 0.2s;
}
.lb-close:hover { color: #f7f5f1; }
.lb-nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  color: rgba(247,245,241,0.35); font-size: 32px; transition: color 0.2s; padding: 0 10px;
}
.lb-nav:hover { color: rgba(247,245,241,0.85); }
.lb-prev { left: -56px; }
.lb-next { right: -56px; }
.lb-foot { margin-top: 10px; display: flex; justify-content: space-between; }
.lb-foot span { font-size: 11px; letter-spacing: 0.07em; color: rgba(247,245,241,0.3); }

@keyframes fadeup { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
.anim { animation: fadeup 0.4s ease both; }

@media (max-width: 768px) {
  .home-hero { grid-template-columns: 1fr; }
  .hero-num { text-align: left; }
  .photo-grid.cols-3 { columns: 2; }
  .bottom-section { grid-template-columns: 1fr; gap: 16px; }
}
@media (max-width: 480px) {
  .album-grid { grid-template-columns: 1fr; }
  .photo-grid.cols-3 { columns: 2; }
}
</style>
</head>
<body>

<nav>
  <span class="nav-name" onclick="goHome()" id="site-name">攝影作品集</span>
  <ul class="nav-links">
    <li><a onclick="goHome()">作品</a></li>
    <li><a onclick="scrollToSection('about-section')">關於</a></li>
    <li><a onclick="scrollToSection('contact-section')">聯繫</a></li>
  </ul>
</nav>

<div class="breadcrumb hidden" id="breadcrumb">
  <span class="bc-link" onclick="goHome()">首頁</span>
  <span class="sep">/</span>
  <span class="current" id="bc-album"></span>
</div>

<!-- HOME -->
<div class="page active" id="page-home">
  <div class="home-hero">
    <div>
      <h1 id="site-h1">載入中…</h1>
      <p id="site-desc"></p>
    </div>
    <div class="hero-num">
      <span class="big" id="home-total">—</span>
      <small>攝影集收錄</small>
    </div>
  </div>

  <div class="home-section">
    <hr class="section-rule">
    <div class="filter-wrap" id="filter-wrap"></div>
    <div class="album-grid" id="album-grid"></div>
  </div>

  <div class="bottom-sections">
    <div class="bottom-section" id="about-section">
      <span class="section-label">關於我</span>
      <div class="section-content" id="about-content"></div>
    </div>
    <div class="bottom-section" id="contact-section">
      <span class="section-label">聯繫方式</span>
      <div class="section-content">
        <div class="contact-rows" id="contact-rows"></div>
      </div>
    </div>
  </div>
  <footer>
    <p id="footer-name"></p>
    <p>以 GitHub Pages 架設</p>
  </footer>
</div>

<!-- ALBUM PAGE -->
<div class="page has-bc" id="page-album">
  <div class="page-header">
    <h2 id="album-title"></h2>
    <div class="meta" id="album-meta"></div>
  </div>
  <div class="album-toolbar">
    <button class="view-btn" id="btn-1" onclick="setView(1)" title="單欄">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="2" width="12" height="5" rx="1"/>
        <rect x="2" y="9" width="12" height="5" rx="1"/>
      </svg>
    </button>
    <button class="view-btn active" id="btn-3" onclick="setView(3)" title="三欄">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="1" y="2" width="4" height="12" rx="1"/>
        <rect x="6" y="2" width="4" height="12" rx="1"/>
        <rect x="11" y="2" width="4" height="12" rx="1"/>
      </svg>
    </button>
  </div>
  <div class="photo-grid cols-3" id="photo-grid"></div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="lbBgClick(event)">
  <div class="lb-inner">
    <button class="lb-close" onclick="closeLb()">關閉 ✕</button>
    <button class="lb-nav lb-prev" onclick="lbStep(-1)">‹</button>
    <img id="lb-img" src="" alt="">
    <button class="lb-nav lb-next" onclick="lbStep(1)">›</button>
    <div class="lb-foot">
      <span id="lb-file"></span>
      <span id="lb-counter"></span>
    </div>
  </div>
</div>

<script src="photos.js"></script>
<script>
const SITE = window.SITE_CONFIG;
const DATA = window.PHOTOS_DATA;

document.getElementById('site-name').textContent = SITE.name;
document.title = SITE.name;
document.getElementById('site-h1').innerHTML = SITE.heroTitle;
document.getElementById('site-desc').textContent = SITE.heroDesc;
document.getElementById('footer-name').textContent = '© ' + new Date().getFullYear() + ' ' + SITE.name;
document.getElementById('about-content').innerHTML =
  '<h3>' + SITE.about.heading + '</h3>' +
  SITE.about.paragraphs.map(p => '<p>' + p + '</p>').join('');
document.getElementById('contact-rows').innerHTML =
  SITE.contact.map(c => '<div class="contact-row"><span class="lbl">' + c.label + '</span>' + c.value + '</div>').join('');

/* STATE */
let curAlbum = null, curFilter = 'all', lbPhotos = [], lbIdx = 0, curView = 3;
const $ = id => document.getElementById(id);

function allAlbums() {
  return DATA.flatMap(cat => cat.albums.map(a => ({ ...a, catId: cat.id, catName: cat.name })));
}

function sortPhotos(arr) {
  return [...arr].sort((a, b) => a.file.localeCompare(b.file, undefined, { numeric: true }));
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  $(id).classList.add('active');
  window.scrollTo(0, 0);
}

/* BREADCRUMB */
function setBreadcrumb(albumName) {
  const bc = $('breadcrumb');
  if (!albumName) { bc.classList.add('hidden'); return; }
  bc.classList.remove('hidden');
  $('bc-album').textContent = albumName;
}

/* HASH ROUTING */
function setHash(key) {
  history.replaceState(null, '', key ? '#' + key : '#');
}

function readHash() {
  const h = location.hash.replace('#', '');
  if (!h) return;
  const parts = h.split('/');
  if (parts.length < 2) return;
  const cat = DATA.find(c => c.id === parts[0]);
  if (!cat) return;
  const album = cat.albums.find(a => a.id === parts[1]);
  if (album) openAlbum({ ...album, catId: cat.id, catName: cat.name });
}

/* HOME */
function goHome() {
  curAlbum = null;
  setHash(null);
  setBreadcrumb(null);
  showPage('page-home');
}

function renderHome() {
  $('home-total').textContent = allAlbums().length;
  renderFilterBtns();
  renderAlbumGrid();
}

function renderFilterBtns() {
  const fw = $('filter-wrap');
  fw.innerHTML = '';
  [{ id: 'all', name: '全部' }, ...DATA.map(c => ({ id: c.id, name: c.name }))].forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (curFilter === item.id ? ' active' : '');
    btn.textContent = item.name;
    btn.addEventListener('click', () => {
      curFilter = item.id;
      fw.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderAlbumGrid();
    });
    fw.appendChild(btn);
  });
}

function renderAlbumGrid() {
  const filtered = allAlbums().filter(a => curFilter === 'all' || a.catId === curFilter);
  const grid = $('album-grid');
  grid.innerHTML = '';
  filtered.forEach((album, i) => {
    const cover = 'photos/' + album.catId + '/' + album.id + '/' + (album.cover || sortPhotos(album.photos)[0]?.file || '');
    const el = document.createElement('div');
    el.className = 'album-card anim';
    el.style.animationDelay = (i * 0.05) + 's';
    el.innerHTML =
      '<div class="album-thumb"><img src="' + cover + '" alt="' + album.name + '" loading="lazy"></div>' +
      '<div class="album-info">' +
        '<div class="album-title">' + album.name + '</div>' +
        '<div class="album-sub">' + (album.date ? album.date + '　' : '') + album.photos.length + ' 張</div>' +
        '<span class="album-tag">' + album.catName + '</span>' +
      '</div>';
    el.addEventListener('click', () => openAlbum(album));
    grid.appendChild(el);
  });
}

/* ALBUM */
function openAlbum(album) {
  curAlbum = album;
  setBreadcrumb(album.name);
  setHash(album.catId + '/' + album.id);
  $('album-title').textContent = album.name;
  $('album-meta').innerHTML = album.catName + (album.date ? '　' + album.date : '') + '<br>' + album.photos.length + ' 張';
  lbPhotos = sortPhotos(album.photos).map(p => ({
    ...p, src: 'photos/' + album.catId + '/' + album.id + '/' + p.file
  }));
  renderPhotoGrid();
  setView(curView);
  showPage('page-album');
}

function renderPhotoGrid() {
  const grid = $('photo-grid');
  grid.innerHTML = '';
  lbPhotos.forEach((photo, i) => {
    const el = document.createElement('div');
    el.className = 'photo-item anim';
    el.style.animationDelay = (i * 0.03) + 's';
    el.innerHTML =
      '<img src="' + photo.src + '" alt="' + photo.file + '" loading="lazy">' +
      '<div class="photo-caption"><span></span><span>' + (i + 1) + ' / ' + lbPhotos.length + '</span></div>';
    el.addEventListener('click', () => openLb(i));
    grid.appendChild(el);
  });
}

/* VIEW TOGGLE */
function setView(n) {
  curView = n;
  const grid = $('photo-grid');
  grid.classList.toggle('cols-1', n === 1);
  grid.classList.toggle('cols-3', n === 3);
  $('btn-1').classList.toggle('active', n === 1);
  $('btn-3').classList.toggle('active', n === 3);
}

/* LIGHTBOX */
function openLb(idx) { lbIdx = idx; renderLb(); $('lightbox').classList.add('open'); document.body.style.overflow = 'hidden'; }
function renderLb() {
  const p = lbPhotos[lbIdx];
  $('lb-img').src = p.src;
  $('lb-file').textContent = '';
  $('lb-counter').textContent = (lbIdx + 1) + ' / ' + lbPhotos.length;
}
function lbStep(dir) { lbIdx = (lbIdx + dir + lbPhotos.length) % lbPhotos.length; renderLb(); }
function closeLb() { $('lightbox').classList.remove('open'); document.body.style.overflow = ''; }
function lbBgClick(e) { if (e.target === $('lightbox')) closeLb(); }
document.addEventListener('keydown', e => {
  if (!$('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLb();
  if (e.key === 'ArrowLeft') lbStep(-1);
  if (e.key === 'ArrowRight') lbStep(1);
});

function scrollToSection(id) {
  goHome();
  setTimeout(() => $(id)?.scrollIntoView({ behavior: 'smooth' }), 60);
}

renderHome();
readHash();
</script>
</body>
</html>
